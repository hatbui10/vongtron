<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Logo vòng tròn</title>

<style>

body{
font-family:Arial;
background:#f4e2a3;
margin:0;
padding:20px;
}

/* layout */
.container{
display:flex;
gap:20px;
align-items:flex-start;
}

/* tool box */
.tools{
width:260px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.tools h3{
margin-top:0;
}

.control{
margin-bottom:12px;
font-size:14px;
}

input{
width:80%;
padding:6px;
margin-top:4px;
}

svg{
width:420px;
height:420px;
background:#f4e2a3;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

.preview{
flex:1;
text-align:center;
}

button{
padding:8px 14px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

<!-- TOOLBOX TRÁI -->
<div class="tools">

<h3>Chỉnh chữ</h3>

<div class="control">
Chữ phía trên
<input id="topInput">
</div>

<div class="control">
Chữ phía dưới
<input id="bottomInput">
</div>

<div class="control">
Bán kính vòng tròn
<input type="range" id="radius" min="60" max="140" value="120">
</div>

<div class="control">
Vị trí chữ trên
<input type="range" id="topOffset" min="0" max="100" value="50">
</div>

<div class="control">
Vị trí chữ dưới
<input type="range" id="bottomOffset" min="0" max="100" value="50">
</div>

<div class="control">
Khoảng cách chữ trên
<input type="range" id="topGap" min="-30" max="40" value="10">
</div>

<div class="control">
Khoảng cách chữ dưới
<input type="range" id="bottomGap" min="-30" max="40" value="10">
</div>

<div class="control">
Kích thước chữ
<input type="range" id="fontSize" min="12" max="50" value="22">
</div>

<div class="control">
Khoảng cách chữ
<input type="range" id="letterSpacing" min="0" max="10" value="4">
</div>

</div>


<!-- PREVIEW -->
<div class="preview">

<svg id="logoSVG" viewBox="0 0 300 300">

<defs>

<path id="topCircle"></path>
<path id="bottomCircle"></path>

<clipPath id="imageClip">
<circle id="clipCircle" cx="150" cy="150" r="60"></circle>
</clipPath>

</defs>

<image id="centerImage"
x="90"
y="90"
width="120"
height="120"
clip-path="url(#imageClip)"
preserveAspectRatio="xMidYMid slice"
href="">
</image>

<circle id="imageBorder"
cx="150"
cy="150"
r="60"
fill="none"
stroke="black"
stroke-width="3"></circle>

<text id="topTextWrap" font-size="22" font-weight="bold" letter-spacing="4">
<textPath id="topText"
href="#topCircle"
startOffset="50%"
text-anchor="middle">
CHỮ PHÍA TRÊN
</textPath>
</text>

<text id="bottomTextWrap" font-size="22" font-weight="bold" letter-spacing="4">
<textPath id="bottomText"
href="#bottomCircle"
startOffset="50%"
text-anchor="middle">
CHỮ PHÍA DƯỚI
</textPath>
</text>

</svg>

<br>
<button id="downloadBtn">Tải PNG</button>

</div>


<!-- TOOLBOX PHẢI -->
<div class="tools">

<h3>Chỉnh ảnh</h3>

<div class="control">
Thêm ảnh
<input type="file" id="imageUpload">
</div>

<div class="control">
Kích thước khung ảnh
<input type="range" id="imgSize" min="30" max="120" value="60">
</div>

<div class="control">
Độ dày viền
<input type="range" id="borderSize" min="1" max="10" value="3">
</div>

<div class="control">
Màu chữ
<input type="color" id="textColor" value="#000000">
</div>

<div class="control">
Màu viền
<input type="color" id="borderColor" value="#000000">
</div>

</div>

</div>


<script>

/* JS GIỮ NGUYÊN CỦA BẠN */

const topInput=document.getElementById("topInput")
const bottomInput=document.getElementById("bottomInput")

const topText=document.getElementById("topText")
const bottomText=document.getElementById("bottomText")

const topWrap=document.getElementById("topTextWrap")
const bottomWrap=document.getElementById("bottomTextWrap")

const radiusSlider=document.getElementById("radius")
const topOffsetSlider=document.getElementById("topOffset")
const bottomOffsetSlider=document.getElementById("bottomOffset")

const topGapSlider=document.getElementById("topGap")
const bottomGapSlider=document.getElementById("bottomGap")

const fontSizeSlider=document.getElementById("fontSize")
const letterSpacingSlider=document.getElementById("letterSpacing")

const imgSizeSlider=document.getElementById("imgSize")
const borderSizeSlider=document.getElementById("borderSize")

const textColor=document.getElementById("textColor")
const borderColor=document.getElementById("borderColor")

const topCircle=document.getElementById("topCircle")
const bottomCircle=document.getElementById("bottomCircle")

const imageUpload=document.getElementById("imageUpload")
const centerImage=document.getElementById("centerImage")

const clipCircle=document.getElementById("clipCircle")
const imageBorder=document.getElementById("imageBorder")

function updateCircle(){

let r=parseInt(radiusSlider.value)
let topGap=parseInt(topGapSlider.value)
let bottomGap=parseInt(bottomGapSlider.value)

topCircle.setAttribute(
"d",
`M150,150 m-${r+topGap},0 a${r+topGap},${r+topGap} 0 1,1 ${(r+topGap)*2},0`
)

bottomCircle.setAttribute(
"d",
`M150,150 m-${r+bottomGap},0 a${r+bottomGap},${r+bottomGap} 0 1,0 ${(r+bottomGap)*2},0`
)

}

function updateImageSize(){

let size=imgSizeSlider.value

clipCircle.setAttribute("r",size)
imageBorder.setAttribute("r",size)

centerImage.setAttribute("x",150-size)
centerImage.setAttribute("y",150-size)

centerImage.setAttribute("width",size*2)
centerImage.setAttribute("height",size*2)

}

function updateBorder(){
imageBorder.setAttribute("stroke-width",borderSizeSlider.value)
}

function updateFont(){

let size=fontSizeSlider.value
let space=letterSpacingSlider.value

topWrap.setAttribute("font-size",size)
bottomWrap.setAttribute("font-size",size)

topWrap.setAttribute("letter-spacing",space)
bottomWrap.setAttribute("letter-spacing",space)

}

function updateColor(){

topWrap.setAttribute("fill",textColor.value)
bottomWrap.setAttribute("fill",textColor.value)

imageBorder.setAttribute("stroke",borderColor.value)

}

topInput.addEventListener("input",()=>topText.textContent=topInput.value)
bottomInput.addEventListener("input",()=>bottomText.textContent=bottomInput.value)

topOffsetSlider.addEventListener("input",()=>topText.setAttribute("startOffset",topOffsetSlider.value+"%"))
bottomOffsetSlider.addEventListener("input",()=>bottomText.setAttribute("startOffset",bottomOffsetSlider.value+"%"))

radiusSlider.addEventListener("input",updateCircle)
topGapSlider.addEventListener("input",updateCircle)
bottomGapSlider.addEventListener("input",updateCircle)

imgSizeSlider.addEventListener("input",updateImageSize)
borderSizeSlider.addEventListener("input",updateBorder)

fontSizeSlider.addEventListener("input",updateFont)
letterSpacingSlider.addEventListener("input",updateFont)

textColor.addEventListener("input",updateColor)
borderColor.addEventListener("input",updateColor)

imageUpload.addEventListener("change",function(){

const file=this.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){
centerImage.setAttribute("href",e.target.result)
}

reader.readAsDataURL(file)

})

document.getElementById("downloadBtn").onclick=function(){

let svg=document.getElementById("logoSVG")
let data=new XMLSerializer().serializeToString(svg)

let canvas=document.createElement("canvas")
canvas.width=800
canvas.height=800

let ctx=canvas.getContext("2d")

let img=new Image()

img.onload=function(){

ctx.drawImage(img,0,0)

let a=document.createElement("a")
a.download="logo.png"
a.href=canvas.toDataURL("image/png")
a.click()

}

img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(data)

}


updateCircle()
updateImageSize()
updateBorder()
updateFont()
updateColor()

</script>

</body>
</html>
