<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Logo vòng tròn</title>

<style>

body{
font-family:Arial;
background:#f4e2a3;
margin:0;
padding:20px;
}

.container{
display:flex;
gap:20px;
align-items:flex-start;
}

.tools{
width:260px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.control{
margin-bottom:12px;
font-size:14px;
}

input{
width:90%;
padding:6px;
margin-top:4px;
}

svg{
width:420px;
height:420px;
background:#f4e2a3;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

.preview{
flex:1;
text-align:center;
}

button{
padding:8px 14px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

#circleImageSVG{
cursor:grab;
}

#logoSVG{
cursor:grab;
}

</style>
</head>

<body>

<div class="container">

<div class="tools">

<h3>Chỉnh chữ</h3>

<div class="control">
Chữ phía trên
<input id="topInput">
</div>

<div class="control">
Chữ phía dưới
<input id="bottomInput">
</div>

<div class="control">
Bán kính vòng tròn
<input type="range" id="radius" min="60" max="140" value="120">
</div>

<div class="control">
Khoảng cách chữ trên
<input type="range" id="topGap" min="-30" max="40" value="10">
</div>

<div class="control">
Khoảng cách chữ dưới
<input type="range" id="bottomGap" min="-30" max="40" value="10">
</div>

<div class="control">
Kích thước chữ
<input type="range" id="fontSize" min="12" max="50" value="22">
</div>

<div class="control">
Khoảng cách ký tự chữ trên
<input type="range" id="topSpacing" min="0" max="15" value="4">
</div>

<div class="control">
Khoảng cách ký tự chữ dưới
<input type="range" id="bottomSpacing" min="0" max="15" value="4">
</div>

</div>

<div class="preview">

<svg id="logoSVG" viewBox="0 0 300 300">

<defs>

<path id="topCircle"></path>
<path id="bottomCircle"></path>

<clipPath id="imageClip">
<circle id="clipCircle" cx="150" cy="150" r="60"></circle>
</clipPath>

</defs>

<image id="centerImage"
x="90"
y="90"
width="120"
height="120"
clip-path="url(#imageClip)"
preserveAspectRatio="xMidYMid slice"
href="">
</image>

<circle id="imageBorder"
cx="150"
cy="150"
r="60"
fill="none"
stroke="black"
stroke-width="3"></circle>

<text id="topTextWrap" font-size="22" font-weight="bold">
<textPath id="topText" href="#topCircle" startOffset="50%" text-anchor="middle">
CHỮ PHÍA TRÊN
</textPath>
</text>

<text id="bottomTextWrap" font-size="22" font-weight="bold">
<textPath id="bottomText" href="#bottomCircle" startOffset="50%" text-anchor="middle">
CHỮ PHÍA DƯỚI
</textPath>
</text>

</svg>

<br>

<button id="downloadBtn">Tải PNG</button>

<hr style="margin:30px 0">

<h3>Bo tròn ảnh riêng</h3>

<svg id="circleImageSVG" viewBox="0 0 300 300" width="300">

<defs>
<clipPath id="circleClip">
<circle id="circleClipShape" cx="150" cy="150" r="120"></circle>
</clipPath>
</defs>

<image id="circleImage"
x="30"
y="30"
width="240"
height="240"
clip-path="url(#circleClip)"
preserveAspectRatio="xMidYMid slice"
href="">
</image>

</svg>

<br>

<input type="file" id="circleUpload">

<br><br>

<button id="downloadCircle">Tải ảnh tròn PNG</button>

</div>

<div class="tools">

<h3>Chỉnh ảnh</h3>

<div class="control">
Thêm ảnh
<input type="file" id="imageUpload">
</div>

<div class="control">
Kích thước khung ảnh
<input type="range" id="imgSize" min="30" max="120" value="60">
</div>

<div class="control">
Độ dày viền
<input type="range" id="borderSize" min="1" max="10" value="3">
</div>

<div class="control">
Màu chữ
<input type="color" id="textColor" value="#000000">
</div>

<div class="control">
Màu viền
<input type="color" id="borderColor" value="#000000">
</div>

<div class="control">
Màu nền
<input type="color" id="bgColor" value="#e6d39c">
</div>

</div>

</div>

<script>

const topText=document.getElementById("topText")
const bottomText=document.getElementById("bottomText")

const topInput=document.getElementById("topInput")
const bottomInput=document.getElementById("bottomInput")

const topWrap=document.getElementById("topTextWrap")
const bottomWrap=document.getElementById("bottomTextWrap")

const radius=document.getElementById("radius")
const topGap=document.getElementById("topGap")
const bottomGap=document.getElementById("bottomGap")

const fontSize=document.getElementById("fontSize")

const topSpacing=document.getElementById("topSpacing")
const bottomSpacing=document.getElementById("bottomSpacing")

const textColor=document.getElementById("textColor")
const borderColor=document.getElementById("borderColor")
const bgColor=document.getElementById("bgColor")

const centerImage=document.getElementById("centerImage")
const clipCircle=document.getElementById("clipCircle")
const imageBorder=document.getElementById("imageBorder")

const topCircle=document.getElementById("topCircle")
const bottomCircle=document.getElementById("bottomCircle")



const imgSizeSlider = document.getElementById("imgSize")

imgSizeSlider.oninput = function(){

let r = parseInt(imgSizeSlider.value)

clipCircle.setAttribute("r", r)
imageBorder.setAttribute("r", r)

}



function updateCircle(){

let r=parseInt(radius.value)

topCircle.setAttribute(
"d",
`M150,150 m-${r+parseInt(topGap.value)},0 a${r+parseInt(topGap.value)},${r+parseInt(topGap.value)} 0 1,1 ${(r+parseInt(topGap.value))*2},0`
)

bottomCircle.setAttribute(
"d",
`M150,150 m-${r+parseInt(bottomGap.value)},0 a${r+parseInt(bottomGap.value)},${r+parseInt(bottomGap.value)} 0 1,0 ${(r+parseInt(bottomGap.value))*2},0`
)

}

radius.oninput=updateCircle
topGap.oninput=updateCircle
bottomGap.oninput=updateCircle

topInput.oninput=()=>topText.textContent=topInput.value
bottomInput.oninput=()=>bottomText.textContent=bottomInput.value

fontSize.oninput=function(){
topWrap.setAttribute("font-size",fontSize.value)
bottomWrap.setAttribute("font-size",fontSize.value)
}

topSpacing.oninput=function(){
topWrap.setAttribute("letter-spacing",topSpacing.value)
}

bottomSpacing.oninput=function(){
bottomWrap.setAttribute("letter-spacing",bottomSpacing.value)
}

textColor.oninput=function(){
topWrap.setAttribute("fill",textColor.value)
bottomWrap.setAttribute("fill",textColor.value)
}

borderColor.oninput=function(){
imageBorder.setAttribute("stroke",borderColor.value)
}

bgColor.oninput=function(){
document.getElementById("logoSVG").style.background=bgColor.value
}

document.getElementById("imageUpload").onchange=function(){

const file=this.files[0]

const reader=new FileReader()

reader.onload=function(e){
centerImage.setAttribute("href",e.target.result)
}

reader.readAsDataURL(file)

}

document.getElementById("downloadBtn").onclick=function(){

const svg=document.getElementById("logoSVG")

const data=new XMLSerializer().serializeToString(svg)

const canvas=document.createElement("canvas")

canvas.width=2048
canvas.height=2048

const ctx=canvas.getContext("2d")

ctx.fillStyle=bgColor.value
ctx.fillRect(0,0,2048,2048)

const img=new Image()

img.onload=function(){

ctx.drawImage(img,0,0,2048,2048)

const a=document.createElement("a")

a.download="logo.png"
a.href=canvas.toDataURL("image/png")

a.click()

}

img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(data)

}

updateCircle()
/* ===== KÉO + ZOOM ẢNH ===== */

let imgX = 90
let imgY = 90
let imgSize = 120

let dragging = false
let startX
let startY

const svg = document.getElementById("logoSVG")

svg.addEventListener("mousedown",function(e){

dragging = true
startX = e.clientX
startY = e.clientY

})

window.addEventListener("mouseup",function(){
dragging = false
})

window.addEventListener("mousemove",function(e){

if(!dragging) return

let dx = e.clientX - startX
let dy = e.clientY - startY

imgX += dx
imgY += dy

centerImage.setAttribute("x",imgX)
centerImage.setAttribute("y",imgY)

startX = e.clientX
startY = e.clientY

})

svg.addEventListener("wheel",function(e){

e.preventDefault()

if(e.deltaY < 0){
imgSize *= 1.1
}else{
imgSize *= 0.9
}

centerImage.setAttribute("width",imgSize)
centerImage.setAttribute("height",imgSize)

})

</script>

</body>
</html>
